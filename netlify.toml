[build]
  publish = "."

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_VERSION = "18"

# 将 /api/* 重定向到对应的 Netlify Function
[[redirects]]
  from = "/api/enter"
  to = "/.netlify/functions/enter"
  status = 200
  force = true

[[redirects]]
  from = "/api/leave"
  to = "/.netlify/functions/leave"
  status = 200
  force = true

[[redirects]]
  from = "/api/click"
  to = "/.netlify/functions/click"
  status = 200
  force = true

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200
  force = true

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200
  force = true

[[redirects]]
  from = "/api/export"
  to = "/.netlify/functions/export"
  status = 200
  force = true
