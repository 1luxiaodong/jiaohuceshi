<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户体验测试 · 数据管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 24px 28px 20px;
    }
    .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .header p  { font-size: 13px; color: rgba(255,255,255,0.5); }
    .header-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; align-items: center; }

    .btn {
      padding: 8px 18px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary  { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-success  { background: #059669; color: #fff; }
    .btn-success:hover { background: #047857; }
    .btn-danger   { background: #dc2626; color: #fff; }
    .btn-danger:hover  { background: #b91c1c; }
    .btn-outline  { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.35); }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    .refresh-time { font-size: 11px; color: rgba(255,255,255,0.35); margin-left: 4px; }

    .main { padding: 20px 28px; }

    /* 总览卡片 */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .ov-card {
      background: #fff; border-radius: 10px; padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .ov-card .lbl { font-size: 11px; color: #999; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 6px; }
    .ov-card .val { font-size: 28px; font-weight: 700; line-height: 1; }
    .ov-card .sub { font-size: 11px; color: #bbb; margin-top: 5px; }
    .c-blue   .val { color: #4f46e5; }
    .c-green  .val { color: #059669; }
    .c-orange .val { color: #ea580c; }
    .c-rose   .val { color: #e11d48; }

    /* 每个方案的卡片 */
    .page-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .page-card {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .page-card-header {
      padding: 14px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-card-header .name { font-size: 14px; font-weight: 700; color: #fff; }
    .page-card-header .count { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .h-a { background: linear-gradient(120deg,#7c3aed,#a855f7); }
    .h-b { background: linear-gradient(120deg,#1d4ed8,#3b82f6); }
    .h-c { background: linear-gradient(120deg,#065f46,#10b981); }
    .h-d { background: linear-gradient(120deg,#92400e,#f59e0b); }

    .page-card-body { padding: 14px 16px; }
    .metric-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid #f5f5f5;
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-label { font-size: 13px; color: #666; }
    .metric-value { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .metric-value.big { font-size: 18px; color: #4f46e5; }

    .page-card-footer {
      padding: 10px 16px;
      border-top: 1px solid #f5f5f5;
      display: flex; gap: 8px;
    }

    /* 详细记录表格 */
    .section {
      background: #fff; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden;
    }
    .section-header {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title { font-size: 14px; font-weight: 600; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: #f8f9fa; padding: 10px 14px;
      text-align: left; font-weight: 600; color: #666;
      font-size: 12px; white-space: nowrap; border-bottom: 1px solid #eee;
    }
    tbody td { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; color: #333; white-space: nowrap; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-page1 { background: #ede9fe; color: #6d28d9; }
    .badge-page2 { background: #dbeafe; color: #1d4ed8; }
    .badge-page3 { background: #d1fae5; color: #065f46; }
    .badge-page4 { background: #fef3c7; color: #92400e; }

    @media (max-width: 600px) {
      .header, .main { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📊 用户体验测试 · 数据管理</h1>
    <p>触觉反馈对比实验 · 四方案统计</p>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="loadData()">↻ 刷新数据</button>
      <button class="btn btn-success" onclick="exportPage('all')">⬇ 导出全部</button>
      <button class="btn btn-danger" onclick="clearData()">🗑 清空数据</button>
      <span class="refresh-time" id="lastRefresh"></span>
    </div>
  </div>

  <div class="main">
    <!-- 总览 -->
    <div class="overview-grid">
      <div class="ov-card c-blue">
        <div class="lbl">总访问次数</div>
        <div class="val" id="totalVisits">—</div>
        <div class="sub">所有方案累计</div>
      </div>
      <div class="ov-card c-green">
        <div class="lbl">独立访客</div>
        <div class="val" id="uniqueVisitors">—</div>
        <div class="sub">按IP去重</div>
      </div>
      <div class="ov-card c-orange">
        <div class="lbl">商品总点击</div>
        <div class="val" id="totalImageClicks">—</div>
        <div class="sub">点击衣服图片</div>
      </div>
      <div class="ov-card c-rose">
        <div class="lbl">购物车总点击</div>
        <div class="val" id="totalCartClicks">—</div>
        <div class="sub">加入购物车</div>
      </div>
    </div>

    <!-- 四方案单独统计 -->
    <div class="page-cards" id="pageCards">
      <!-- 动态渲染 -->
    </div>

    <!-- 详细记录 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title">详细访问记录</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>IP地址</th><th>方案</th>
              <th>进入时间</th><th>停留时长</th>
              <th>商品点击</th><th>购物车点击</th>
            </tr>
          </thead>
          <tbody id="detailTable">
            <tr><td colspan="7" style="text-align:center;padding:32px;color:#ccc">点击「刷新数据」加载</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const PAGE_CONFIGS = [
      { id: 'page1', label: '方案A：震动反馈',           hClass: 'h-a', badge: 'badge-page1' },
      { id: 'page2', label: '方案B：文字描述',           hClass: 'h-b', badge: 'badge-page2' },
      { id: 'page3', label: '方案C：购物车按钮',         hClass: 'h-c', badge: 'badge-page3' },
      { id: 'page4', label: '方案D：震动+描述+购物车',   hClass: 'h-d', badge: 'badge-page4' },
    ];

    function exportPage(pageId) {
      const url = pageId === 'all' ? '/api/export' : `/api/export?page=${pageId}`;
      window.location.href = url;
    }

    async function loadData() {
      try {
        const [statsRes, detailRes] = await Promise.all([
          fetch('/api/stats'), fetch('/api/data')
        ]);
        const stats  = await statsRes.json();
        const detail = await detailRes.json();
        const statsArr  = Array.isArray(stats)  ? stats  : [];
        const detailArr = Array.isArray(detail) ? detail : [];

        renderOverview(statsArr, detailArr);
        renderPageCards(statsArr);
        renderDetail(detailArr);

        document.getElementById('lastRefresh').textContent =
          '最后更新：' + new Date().toLocaleTimeString('zh-CN');
      } catch(e) {
        console.error('加载失败', e);
      }
    }

    function renderOverview(stats, detail) {
      document.getElementById('totalVisits').textContent = detail.length;
      document.getElementById('uniqueVisitors').textContent = new Set(detail.map(d => d.ip)).size;
      document.getElementById('totalImageClicks').textContent = detail.reduce((s,d) => s+(d.image_clicks||0), 0);
      document.getElementById('totalCartClicks').textContent  = detail.reduce((s,d) => s+(d.cart_clicks||0), 0);
    }

    function renderPageCards(stats) {
      const statsMap = {};
      stats.forEach(s => { statsMap[s.page] = s; });

      const html = PAGE_CONFIGS.map(cfg => {
        const s = statsMap[cfg.id];
        const visits   = s ? s.visit_count : 0;
        const avgDwell = s ? s.avg_dwell_seconds : '—';
        const imgClk   = s ? s.total_image_clicks : 0;
        const cartClk  = s ? s.total_cart_clicks : 0;

        return `
          <div class="page-card">
            <div class="page-card-header ${cfg.hClass}">
              <div>
                <div class="name">${cfg.label}</div>
                <div class="count">共 ${visits} 次访问</div>
              </div>
            </div>
            <div class="page-card-body">
              <div class="metric-row">
                <span class="metric-label">⏱ 平均停留时长</span>
                <span class="metric-value big">${avgDwell !== '—' ? avgDwell + 's' : '—'}</span>
              </div>
              <div class="metric-row">
                <span class="metric-label">👆 商品点击次数</span>
                <span class="metric-value">${imgClk}</span>
              </div>
              <div class="metric-row">
                <span class="metric-label">🛒 购物车点击次数</span>
                <span class="metric-value">${cartClk}</span>
              </div>
            </div>
            <div class="page-card-footer">
              <button class="btn btn-success btn-sm" onclick="exportPage('${cfg.id}')">⬇ 导出本方案</button>
            </div>
          </div>`;
      }).join('');

      document.getElementById('pageCards').innerHTML = html;
    }

    function renderDetail(detail) {
      if (!detail.length) {
        document.getElementById('detailTable').innerHTML =
          '<tr><td colspan="7" style="text-align:center;padding:32px;color:#ccc">暂无访问记录</td></tr>';
        return;
      }
      const badgeMap = { page1:'badge-page1', page2:'badge-page2', page3:'badge-page3', page4:'badge-page4' };
      const rows = detail.slice(0, 200).map(r => {
        const badge = badgeMap[r.page] || 'badge-page1';
        const t = r.enter_time ? new Date(r.enter_time).toLocaleString('zh-CN',{hour12:false}) : '—';
        const d = r.dwell_seconds != null ? r.dwell_seconds.toFixed(1) + 's' : '—';
        return `<tr>
          <td style="color:#aaa">${r.id}</td>
          <td style="font-family:monospace;font-size:12px">${r.ip}</td>
          <td><span class="badge ${badge}">${r.page_label}</span></td>
          <td>${t}</td>
          <td><strong>${d}</strong></td>
          <td>${r.image_clicks || 0}</td>
          <td>${r.cart_clicks || 0}</td>
        </tr>`;
      }).join('');
      document.getElementById('detailTable').innerHTML = rows;
    }

    async function clearData() {
      if (!confirm('确定要清空所有实验数据吗？此操作不可撤销。')) return;
      await fetch('/api/data', { method: 'DELETE' });
      loadData();
    }

    // 页面加载时主动拉一次
    loadData();
  </script>
</body>
</html>
