<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户体验测试 · 数据管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      color: #1a1a1a;
    }

    /* 顶部标题栏 */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 24px 32px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .header p { font-size: 13px; color: rgba(255,255,255,0.55); }
    .header-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    /* 按钮样式 */
    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-success { background: #059669; color: #fff; }
    .btn-success:hover { background: #047857; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:hover  { background: #b91c1c; }
    .btn-outline {
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.35);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }

    /* 统计卡片区 */
    .main { padding: 24px 32px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    .stat-card .sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }
    .stat-card.accent-blue .value { color: #4f46e5; }
    .stat-card.accent-green .value { color: #059669; }
    .stat-card.accent-orange .value { color: #ea580c; }
    .stat-card.accent-rose .value { color: #e11d48; }

    /* 对比表格区 */
    .section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .section-subtitle {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }

    /* 进度条对比 */
    .compare-grid {
      padding: 20px;
      display: grid;
      gap: 20px;
    }
    .compare-row {
      display: grid;
      grid-template-columns: 160px 1fr 60px;
      align-items: center;
      gap: 12px;
    }
    .compare-label { font-size: 13px; color: #555; }
    .bar-wrap {
      height: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }
    .bar-a { background: linear-gradient(90deg, #a855f7, #7c3aed); }
    .bar-b { background: linear-gradient(90deg, #3b82f6, #1d4ed8); }
    .bar-c { background: linear-gradient(90deg, #10b981, #059669); }
    .bar-d { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .compare-num { font-size: 13px; font-weight: 600; color: #333; text-align: right; }

    /* 详细数据表格 */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #f8f9fa;
      padding: 11px 14px;
      text-align: left;
      font-weight: 600;
      color: #555;
      font-size: 12px;
      white-space: nowrap;
      border-bottom: 1px solid #eee;
    }
    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid #f5f5f5;
      color: #333;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    .page-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-page1 { background: #ede9fe; color: #6d28d9; }
    .badge-page2 { background: #dbeafe; color: #1d4ed8; }
    .badge-page3 { background: #d1fae5; color: #065f46; }
    .badge-page4 { background: #fef3c7; color: #92400e; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #ccc;
    }
    .empty-state p { font-size: 14px; }

    .refresh-time {
      font-size: 11px;
      color: #bbb;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .header { padding: 20px 16px; }
      .main { padding: 16px; }
      .compare-row { grid-template-columns: 120px 1fr 50px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📊 用户体验测试 · 数据管理</h1>
    <p>触觉反馈对比实验 · 实时数据统计</p>
    <div class="header-actions">
      <button class="btn btn-success" onclick="exportExcel()">⬇ 导出 Excel</button>
      <button class="btn btn-outline" onclick="loadData()">↻ 刷新数据</button>
      <button class="btn btn-danger" onclick="clearData()">🗑 清空数据</button>
    </div>
  </div>

  <div class="main">
    <!-- 汇总卡片 -->
    <div class="stats-grid" id="statsCards">
      <div class="stat-card accent-blue">
        <div class="label">总访问次数</div>
        <div class="value" id="totalVisits">—</div>
        <div class="sub">所有页面累计</div>
      </div>
      <div class="stat-card accent-green">
        <div class="label">独立访客</div>
        <div class="value" id="uniqueVisitors">—</div>
        <div class="sub">按IP去重</div>
      </div>
      <div class="stat-card accent-orange">
        <div class="label">衣服总点击</div>
        <div class="value" id="totalImageClicks">—</div>
        <div class="sub">图片点击次数</div>
      </div>
      <div class="stat-card accent-rose">
        <div class="label">购物车总点击</div>
        <div class="value" id="totalCartClicks">—</div>
        <div class="sub">加入购物车次数</div>
      </div>
    </div>

    <!-- 各方案对比 -->
    <div class="section">
      <div class="section-header">
        <div>
          <div class="section-title">各方案对比</div>
          <div class="section-subtitle">四个测试页面的指标横向比较</div>
        </div>
        <span class="refresh-time" id="lastRefresh"></span>
      </div>
      <div class="compare-grid" id="compareGrid">
        <div class="empty-state"><p>暂无数据，等待用户访问...</p></div>
      </div>
    </div>

    <!-- 详细记录 -->
    <div class="section">
      <div class="section-header">
        <div>
          <div class="section-title">详细访问记录</div>
          <div class="section-subtitle">每次访问的完整数据</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>IP地址</th>
              <th>页面方案</th>
              <th>进入时间</th>
              <th>停留时长</th>
              <th>衣服点击</th>
              <th>购物车点击</th>
            </tr>
          </thead>
          <tbody id="detailTable">
            <tr><td colspan="7" class="empty-state"><p>暂无记录</p></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const PAGE_COLORS = {
      page1: 'badge-page1',
      page2: 'badge-page2',
      page3: 'badge-page3',
      page4: 'badge-page4'
    };

    async function loadData() {
      try {
        const [statsRes, detailRes] = await Promise.all([
          fetch('/api/stats'),
          fetch('/api/data')
        ]);
        const statsRaw = await statsRes.json();
        const detailRaw = await detailRes.json();
        const stats  = Array.isArray(statsRaw)  ? statsRaw  : [];
        const detail = Array.isArray(detailRaw) ? detailRaw : [];
        if (!statsRes.ok || !detailRes.ok) {
          console.warn('API 错误:', statsRaw, detailRaw);
        }
        renderStats(stats, detail);
        renderDetail(detail);
        document.getElementById('lastRefresh').textContent =
          '最后刷新：' + new Date().toLocaleTimeString('zh-CN');
      } catch(e) {
        console.error('加载数据失败', e);
      }
    }

    function renderStats(stats, detail) {
      const totalVisits = detail.length;
      const uniqueIPs = new Set(detail.map(d => d.ip)).size;
      const totalImg = detail.reduce((s, d) => s + (d.image_clicks || 0), 0);
      const totalCart = detail.reduce((s, d) => s + (d.cart_clicks || 0), 0);

      document.getElementById('totalVisits').textContent = totalVisits;
      document.getElementById('uniqueVisitors').textContent = uniqueIPs;
      document.getElementById('totalImageClicks').textContent = totalImg;
      document.getElementById('totalCartClicks').textContent = totalCart;

      if (!stats.length) {
        document.getElementById('compareGrid').innerHTML =
          '<div class="empty-state"><p>暂无足够数据</p></div>';
        return;
      }

      const maxDwell = Math.max(...stats.map(s => s.avg_dwell_seconds || 0), 1);
      const maxImg   = Math.max(...stats.map(s => s.total_image_clicks || 0), 1);
      const maxCart  = Math.max(...stats.map(s => s.total_cart_clicks || 0), 1);
      const maxVisit = Math.max(...stats.map(s => s.visit_count || 0), 1);

      const barClasses = ['bar-a', 'bar-b', 'bar-c', 'bar-d'];
      const pageMap = { page1: 0, page2: 1, page3: 2, page4: 3 };

      const metrics = [
        {
          key: 'avg_dwell_seconds',
          label: '平均停留时长 (秒)',
          max: maxDwell,
          fmt: v => (v || 0).toFixed(1) + 's'
        },
        {
          key: 'visit_count',
          label: '访问次数',
          max: maxVisit,
          fmt: v => v || 0
        },
        {
          key: 'total_image_clicks',
          label: '衣服点击次数',
          max: maxImg,
          fmt: v => v || 0
        },
        {
          key: 'total_cart_clicks',
          label: '购物车点击次数',
          max: maxCart,
          fmt: v => v || 0
        }
      ];

      let html = '';
      metrics.forEach(metric => {
        html += `<div style="margin-bottom:4px"><div style="font-size:12px;color:#888;font-weight:600;margin-bottom:8px;text-transform:uppercase">${metric.label}</div>`;
        stats.forEach(s => {
          const idx = pageMap[s.page] ?? 0;
          const barClass = barClasses[idx];
          const val = s[metric.key] || 0;
          const pct = Math.round((val / metric.max) * 100);
          html += `
            <div class="compare-row">
              <div class="compare-label" style="font-size:12px">${s.page_label}</div>
              <div class="bar-wrap"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
              <div class="compare-num">${metric.fmt(val)}</div>
            </div>`;
        });
        html += '</div>';
      });

      document.getElementById('compareGrid').innerHTML = html;
    }

    function renderDetail(detail) {
      if (!detail.length) {
        document.getElementById('detailTable').innerHTML =
          '<tr><td colspan="7" style="text-align:center;padding:32px;color:#ccc">暂无访问记录</td></tr>';
        return;
      }

      const rows = detail.slice(0, 100).map(r => {
        const badge = PAGE_COLORS[r.page] || 'badge-page1';
        const enterTime = r.enter_time
          ? new Date(r.enter_time).toLocaleString('zh-CN', { hour12: false })
          : '—';
        const dwell = r.dwell_seconds != null
          ? r.dwell_seconds.toFixed(1) + 's'
          : '—';
        return `<tr>
          <td style="color:#aaa">${r.id}</td>
          <td style="font-family:monospace;font-size:12px">${r.ip}</td>
          <td><span class="page-badge ${badge}">${r.page_label}</span></td>
          <td>${enterTime}</td>
          <td><strong>${dwell}</strong></td>
          <td>${r.image_clicks}</td>
          <td>${r.cart_clicks}</td>
        </tr>`;
      }).join('');

      document.getElementById('detailTable').innerHTML = rows;
    }

    function exportExcel() {
      window.location.href = '/api/export';
    }

    async function clearData() {
      if (!confirm('确定要清空所有实验数据吗？此操作不可撤销。')) return;
      try {
        await fetch('/api/data', { method: 'DELETE' });
        loadData();
        alert('数据已清空');
      } catch(e) {
        alert('清空失败：' + e.message);
      }
    }

    // 初始加载并自动刷新
    loadData();
    setInterval(loadData, 15000);
  </script>
</body>
</html>
