<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品详情</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }

    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .nav-back { font-size: 20px; color: #333; padding: 4px 8px 4px 0; }
    .nav-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; color: #333; }
    .nav-placeholder { width: 36px; }

    .product-image-wrap {
      position: relative;
      background: #fff;
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
    }
    .product-image-wrap img {
      width: 100%;
      display: block;
      transition: transform 0.15s ease;
    }
    .product-image-wrap.tapped img { transform: scale(0.97); }

    .haptic-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(4px);
    }
    .haptic-badge::before { content: '📳'; font-size: 13px; }

    @keyframes hapticShake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-6px); }
      30%  { transform: translateX(6px); }
      45%  { transform: translateX(-5px); }
      60%  { transform: translateX(5px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    .product-image-wrap.shaking {
      animation: hapticShake 0.35s ease;
    }

    .ripple-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }
    .ripple-ring.animate {
      animation: rippleOut 0.6s ease-out forwards;
    }
    @keyframes rippleOut {
      0%   { transform: scale(0); opacity: 0.9; }
      100% { transform: scale(4); opacity: 0; }
    }

    .product-info {
      background: #fff;
      padding: 16px;
      margin-bottom: 8px;
    }
    .product-price { display: none; }
    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .product-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      color: #ff6b35;
      border: 1px solid #ff6b35;
      border-radius: 3px;
      padding: 2px 6px;
    }

    /* 触感提示 */
    .touch-hint {
      text-align: center;
      padding: 10px 16px;
      background: #fff;
      margin-bottom: 8px;
    }
    .touch-hint p {
      font-size: 13px;
      color: #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff2d55;
      animation: pulseDot 1.4s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.6); opacity: 0.4; }
    }

    /* 材质描述 */
    .material-section {
      background: #fff;
      padding: 16px;
      margin-bottom: 8px;
    }
    .material-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .material-title::before {
      content: '';
      display: block;
      width: 3px;
      height: 16px;
      background: #ff2d55;
      border-radius: 2px;
    }
    .material-text {
      font-size: 14px;
      color: #555;
      line-height: 1.9;
      letter-spacing: 0.3px;
    }
    .fabric-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .fabric-item {
      background: #fafafa;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }
    .fabric-icon { font-size: 20px; margin-bottom: 4px; }
    .fabric-name { font-size: 12px; color: #555; }

    .spec-section {
      background: #fff;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .spec-title { font-size: 13px; color: #999; margin-bottom: 10px; }
    .spec-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .spec-item {
      padding: 6px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
    }
    .spec-item.active { border-color: #ff2d55; color: #ff2d55; background: #fff5f7; }

    /* 底部购物栏 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      z-index: 200;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .btn-wishlist {
      flex: 0 0 52px;
      height: 46px;
      background: #fff;
      border: 1.5px solid #ff2d55;
      border-radius: 23px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }
    .btn-wishlist:active { background: #fff0f3; }
    .btn-cart {
      flex: 1;
      height: 46px;
      background: linear-gradient(90deg, #ff6b35, #ff2d55);
      border: none;
      border-radius: 23px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-cart:active { opacity: 0.88; transform: scale(0.98); }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    .bottom-spacer { height: 80px; }
  </style>
</head>
<body>

  <div class="nav-bar">
    <span class="nav-back" onclick="history.length>1?history.back():location.href='index.html'" style="cursor:pointer">‹</span>
    <span class="nav-title">商品详情</span>
    <span class="nav-placeholder"></span>
  </div>

  <div class="product-image-wrap" id="productImage">
    <img src="close.avif" alt="白色针织毛衣" id="productImg">
    <div class="haptic-badge">触感体验</div>
  </div>



  <div class="product-info">
    <div class="product-name">【柔软亲肤】白色针织毛衣女秋冬宽松慵懒风百搭上衣</div>
    <div class="product-tags">
      <span class="tag">柔软针织</span>
      <span class="tag">亲肤透气</span>
      <span class="tag">弹性舒适</span>
    </div>
  </div>

  <div class="material-section">
    <div class="material-title">面料质感</div>
    <div class="material-text">
      这款白色毛衣采用柔软的针织面料制成。面料细腻顺滑，触感亲肤，贴身穿着不会产生刺痒感。织物具有一定弹性，并具有良好的透气性。整体质地柔软，表面纹理细致，穿着时带来温暖舒适的触感。
    </div>
    <div class="fabric-features">
      <div class="fabric-item">
        <div class="fabric-icon">🧶</div>
        <div class="fabric-name">柔软针织</div>
      </div>
      <div class="fabric-item">
        <div class="fabric-icon">🌬️</div>
        <div class="fabric-name">透气舒适</div>
      </div>
      <div class="fabric-item">
        <div class="fabric-icon">✨</div>
        <div class="fabric-name">细腻顺滑</div>
      </div>
      <div class="fabric-item">
        <div class="fabric-icon">🤸</div>
        <div class="fabric-name">弹性伸展</div>
      </div>
      <div class="fabric-item">
        <div class="fabric-icon">🌸</div>
        <div class="fabric-name">亲肤无刺</div>
      </div>
      <div class="fabric-item">
        <div class="fabric-icon">🌡️</div>
        <div class="fabric-name">温暖保暖</div>
      </div>
    </div>
  </div>

  <div class="spec-section">
    <div class="spec-title">选择尺码</div>
    <div class="spec-list">
      <div class="spec-item">S</div>
      <div class="spec-item active">M</div>
      <div class="spec-item">L</div>
      <div class="spec-item">XL</div>
    </div>
  </div>

  <div class="bottom-spacer"></div>

  <div class="bottom-bar">
    <div class="btn-wishlist">♡</div>
    <button class="btn-cart" id="cartBtn">
      <span>🛒</span>
      加入购物车
    </button>
  </div>

  <div class="toast" id="toast">已加入购物车 ✓</div>

  <script>
    const PAGE_ID = 'page4';
    const PAGE_LABEL = '方案D：完整体验（震动+描述+购物车）';
    let sessionId = null;
    let imageClicks = 0;
    let cartClicks = 0;
    const enterTime = Date.now();

    fetch('/api/enter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page: PAGE_ID, page_label: PAGE_LABEL, enter_time: enterTime })
    }).then(r => r.json()).then(d => { sessionId = d.session_id; });

    function sendLeave() {
      if (!sessionId) return;
      const data = JSON.stringify({
        session_id: sessionId,
        leave_time: Date.now(),
        image_clicks: imageClicks,
        cart_clicks: cartClicks
      });
      navigator.sendBeacon('/api/leave', new Blob([data], { type: 'application/json' }));
    }
    window.addEventListener('beforeunload', sendLeave);
    window.addEventListener('pagehide', sendLeave);

    function triggerHaptic() {
      if ('vibrate' in navigator) {
        navigator.vibrate([200, 80, 200, 80, 200]);
      }
      const el = document.getElementById('productImage');
      el.classList.remove('shaking');
      void el.offsetWidth;
      el.classList.add('shaking');
      el.addEventListener('animationend', () => el.classList.remove('shaking'), { once: true });
    }

    const wrap = document.getElementById('productImage');
    wrap.addEventListener('click', function(e) {
      imageClicks++;
      triggerHaptic();

      wrap.classList.add('tapped');
      setTimeout(() => wrap.classList.remove('tapped'), 200);

      const rect = wrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const size = 60;
      const ripple = document.createElement('div');
      ripple.className = 'ripple-ring';
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
      wrap.appendChild(ripple);
      requestAnimationFrame(() => ripple.classList.add('animate'));
      setTimeout(() => ripple.remove(), 700);

      if (sessionId) {
        fetch('/api/click', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, type: 'image' })
        });
      }
    });

    document.getElementById('cartBtn').addEventListener('click', function() {
      cartClicks++;
      if ('vibrate' in navigator) navigator.vibrate(30);
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
      if (sessionId) {
        fetch('/api/click', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, type: 'cart' })
        });
      }
    });

    document.querySelectorAll('.spec-item').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.spec-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
